<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Modular AR - Master Target v1.5.2</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>

    <script>
        // ==========================================
        // ★ 設定：このリストにフォルダ名を追加
        // ==========================================
        const arsystem = ["hotarin", "hotarin2",  "train"]; 
        const SHOW_ALL_DEBUG = true; 
        const MASTER_MIND = "./assets/target.mind"; // assets直下のターゲット

        // 動的スクリプトロード
        arsystem.forEach(id => {
            const script = document.createElement('script');
            script.src = `assets/${id}/motion.js`;
            document.head.appendChild(script);
        });

        window.addEventListener("DOMContentLoaded", () => {
            const scene = document.querySelector('a-scene');
            const assetManager = document.querySelector('#asset-manager');
            const headerText = document.querySelector('#header p');
            headerText.innerText = "ターゲットを映してね！";

            // シーンにマスターターゲットを設定
            scene.setAttribute('mindar-image', `imageTargetSrc: ${MASTER_MIND}; uiScanning: no;`);

            // ★唯一の共通ターゲットエンティティを作成
            const mainTarget = document.createElement('a-entity');
            mainTarget.setAttribute('mindar-image-target', 'targetIndex: 0');
            scene.appendChild(mainTarget);

            // 認識イベント
            mainTarget.addEventListener("targetFound", () => { headerText.innerText = "ジオラマが起動しました！"; });
            mainTarget.addEventListener("targetLost", () => { headerText.innerText = "ターゲットを映してね！"; });

            // 各キャラを「子要素」として追加

        arsystem.forEach((id) => {
            const assetItem = document.createElement('a-asset-item');
            assetItem.setAttribute('id', `${id}Model`);
            assetItem.setAttribute('src', `assets/${id}/model.glb`);
            assetManager.appendChild(assetItem);

            const characterContainer = document.createElement('a-entity');
            characterContainer.innerHTML = `
                <a-entity ${id}-logic="showDebugBox: ${SHOW_ALL_DEBUG}">
                    <a-gltf-model src="#${id}Model" rotation="90 0 0" animation-mixer></a-gltf-model>
                </a-entity>
            `;
            mainTarget.appendChild(characterContainer);
        });
        });

        function toggleCredits() { document.querySelector('#credits-info').classList.toggle('hidden'); }
        function takePhoto() {
            const scene = document.querySelector('a-scene');
            const video = document.querySelector('video');
            if(!video) return;
            scene.renderer.render(scene.object3D, scene.camera);
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.drawImage(scene.canvas, 0, 0, canvas.width, canvas.height);
            const link = document.createElement('a');
            link.download = `ar-capture-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #header { position: fixed; top: 0; width: 100%; height: 80px; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #header p { font-weight: bold; margin: 0; }
        #info-btn { position: fixed; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; z-index: 1100; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid white; }
        #credits-info { position: fixed; top: 80px; right: 20px; width: 260px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 10px; z-index: 1050; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 0.8rem; line-height: 1.4; color: #333; }
        .hidden { display: none !important; }
        video, .a-canvas { top: 80px !important; height: calc(100% - 80px) !important; }
        #capture-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; background: white; border-radius: 50%; z-index: 1001; border: 5px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header"><p>Loading...</p></div>
    <div id="info-btn" onclick="toggleCredits()">i</div>
    <div id="credits-info" class="hidden">
        <h3>Licenses & Credits</h3>
        <p>AR: Mind-AR (MIT) / Models: Meshy (CC BY 4.0)</p>
    </div>
    <div id="capture-btn" onclick="takePhoto()"></div>
    <a-scene renderer="preserveDrawingBuffer: true; alpha: true; colorManagement: true;" vr-mode-ui="enabled: false">
        <a-assets id="asset-manager"></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>
</body>
</html>
