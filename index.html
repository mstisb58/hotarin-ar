<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hotarin AR - Camera Edition</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background-color: #000; overflow: hidden; }

        #header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: white; color: black; display: flex;
            align-items: center; justify-content: center; z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        #header p { margin: 0; font-weight: bold; font-size: 1.1rem; }

        video { top: 80px !important; height: calc(100% - 80px) !important; object-fit: cover; }
        .a-canvas { top: 80px !important; height: calc(100% - 80px) !important; }

        #scanning-overlay {
            position: absolute; top: 120px; left: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 999;
        }
        #scanning-overlay .inner {
            background: rgba(255, 255, 255, 0.7); padding: 10px 20px;
            border-radius: 25px; color: #333; font-size: 0.9rem;
        }

        #capture-btn {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.9);
            border: 6px solid #fff; border-radius: 50%; z-index: 1001;
            cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        #capture-btn::after {
            content: ""; width: 60px; height: 60px; border-radius: 50%; border: 2px solid #333;
        }

        #shutter-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 2000; pointer-events: none;
        }
        .flash-anim { animation: flash-effect 0.3s ease-out; }
        @keyframes flash-effect {
            0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
        }

        #photo-preview {
            position: fixed; top: 80px; left: 0; width: 100%; height: calc(100% - 80px);
            background: black; z-index: 1500; display: none; object-fit: contain;
        }

        .hidden { display: none !important; }
    </style>

    <script>
        // --- 設定エリア：ここだけ変えればOK ---
        const VERSION = "1.03";
        const MSG_WAITING = `ジオラマを映してください(version ${VERSION})`;
        const MSG_FOUND = "ほたりんが出現中！";
        // ------------------------------------

        AFRAME.registerComponent('hotarin-logic', {
            schema: {
                radius: { type: 'number', default: 0.8 },
                height: { type: 'number', default: 0.5 },
                orbitSpeed: { type: 'number', default: 0.0008 },
                yFloat: { type: 'number', default: 0.08 },
                manualRot: { type: 'vec3', default: { x: 0, y: 0, z: 0 } },
                modelScale: { type: 'number', default: 0.4 }
            },
            tick: function (time, delta) {
                const d = this.data;
                const t = time * d.orbitSpeed;
                const x = Math.cos(t) * d.radius;
                const z = Math.sin(t) * d.radius;
                const y = d.height + Math.sin(t * 2) * d.yFloat;
                this.el.setAttribute('position', { x: x, y: y, z: z });
                const angle = - (t * 180 / Math.PI) - 90;
                this.el.setAttribute('rotation', { x: d.manualRot.x, y: angle + d.manualRot.y, z: d.manualRot.z });
                this.el.setAttribute('scale', { x: d.modelScale, y: d.modelScale, z: d.modelScale });
            }
        });

        window.addEventListener("load", () => {
            const target = document.querySelector('#target-entity');
            const overlay = document.querySelector('#scanning-overlay');
            const headerText = document.querySelector('#header p');
            const captureBtn = document.querySelector('#capture-btn');
            const flash = document.querySelector('#shutter-flash');
            const preview = document.querySelector('#photo-preview');

            // 初期メッセージのセット
            headerText.innerText = MSG_WAITING;

            target.addEventListener("targetFound", () => {
                overlay.classList.add("hidden");
                headerText.innerText = MSG_FOUND;
            });

            target.addEventListener("targetLost", () => {
                overlay.classList.remove("hidden");
                headerText.innerText = MSG_WAITING;
            });

            captureBtn.addEventListener('click', () => {
                const scene = document.querySelector('a-scene');
                const video = document.querySelector('video');
                const canvas = scene.canvas;

                // --- ここが重要！撮影の瞬間に強制的に再描画させる ---
                scene.renderer.render(scene.object3D, scene.camera);

                flash.classList.remove('flash-anim');
                void flash.offsetWidth; 
                flash.classList.add('flash-anim');

                const combinedCanvas = document.createElement('canvas');
                // 解像度はビデオ（実写）に合わせると綺麗になります
                combinedCanvas.width = video.videoWidth;
                combinedCanvas.height = video.videoHeight;
                const ctx = combinedCanvas.getContext('2d');

                // 1. 実写映像を先に描画
                ctx.drawImage(video, 0, 0, combinedCanvas.width, combinedCanvas.height);

                // 2. 3Dモデルをその上に描画
                ctx.drawImage(canvas, 0, 0, combinedCanvas.width, combinedCanvas.height);

                const dataURL = combinedCanvas.toDataURL("image/png");
                
                // プレビュー表示
                preview.src = dataURL;
                preview.style.display = 'block';

                // ダウンロード
                const link = document.createElement('a');
                link.download = `hotarin-photo-${Date.now()}.png`;
                link.href = dataURL;
                link.click();

                setTimeout(() => {
                    preview.style.display = 'none';
                    preview.src = "";
                }, 1500);
            });
        });
    </script>
</head>

<body>
    <div id="shutter-flash"></div>
    <img id="photo-preview" alt="Preview">

    <div id="header">
        <p>Loading...</p>
    </div>

    <div id="scanning-overlay">
        <div class="inner">ほたりんを探しています...</div>
    </div>

    <div id="capture-btn" title="写真を撮る"></div>

    <a-scene 
        mindar-image="imageTargetSrc: ./assets/hotarin/target.mind; uiScanning: no;"
        renderer="colorManagement: true; physicallyCorrectLights: true; preserveDrawingBuffer: true; alpha: true;" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="hotarinModel" src="./assets/hotarin/model.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" color="#BBB" intensity="1.5"></a-light>
        <a-light type="directional" color="#FFF" intensity="1.0" position="-1 1 1"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#hotarinModel" 
                hotarin-logic="radius: 0.8; height: 0.5; orbitSpeed: 0.0008; modelScale: 0.4;" 
                animation-mixer>
            </a-gltf-model>
        </a-entity>
    </a-scene>
</body>

</html>
